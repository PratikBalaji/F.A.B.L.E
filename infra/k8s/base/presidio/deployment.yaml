apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio-analyzer
  namespace: fable
  labels:
    app: presidio-analyzer
    app.kubernetes.io/part-of: fable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presidio-analyzer
  template:
    metadata:
      labels:
        app: presidio-analyzer
    spec:
      containers:
        - name: presidio-analyzer
          image: mcr.microsoft.com/presidio-analyzer:latest
          ports:
            - containerPort: 3000
          env:
            - name: DEFAULT_PORT
              value: "3000"
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
