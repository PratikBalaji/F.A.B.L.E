apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fable

resources:
  - namespace.yaml
  # Shared config
  - shared/configmap-models.yaml
  - shared/secret-api-keys.yaml
  - shared/hpa-planning.yaml
  - shared/hpa-execution.yaml
  - shared/hpa-review.yaml
  # Coordinator
  - coordinator/deployment.yaml
  - coordinator/service.yaml
  # Agent pods
  - planning-pod/deployment.yaml
  - planning-pod/service.yaml
  - execution-pod/deployment.yaml
  - execution-pod/service.yaml
  - review-pod/deployment.yaml
  - review-pod/service.yaml
  # Presidio sidecar (Phase 10) — NER-grade PII detection in-cluster
  - presidio/deployment.yaml
  - presidio/service.yaml
  # Ingress
  - ingress.yaml

patches:
  # Inject PRESIDIO_URL into coordinator so pii.py uses in-cluster sidecar
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PRESIDIO_URL
          value: "http://presidio-analyzer:3000"
    target:
      kind: Deployment
      name: coordinator

commonLabels:
  app.kubernetes.io/part-of: fable
