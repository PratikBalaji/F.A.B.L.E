apiVersion: v1
kind: ConfigMap
metadata:
  name: model-config
  namespace: fable
data:
  # Standard pipeline
  PRIMARY_MODEL: "anthropic/claude-sonnet-4"
  SECONDARY_MODEL: "openai/gpt-4o-mini"
  CRITIC_MODEL: "openai/gpt-4o-mini"
  # Adversarial pipeline role-to-model mapping
  PLANNER_MODEL: "anthropic/claude-sonnet-4-5"
  ACTOR_MODEL: "openai/gpt-4o"
  # Phase 12 rebalanced: Haiku-3.5 for Critic (better adversarial reasoning vs Llama),
  # gpt-4o-mini for Validator+Refiner (structured output, eliminates model redundancy).
  ADV_CRITIC_MODEL: "anthropic/claude-3.5-haiku"
  VALIDATOR_MODEL: "openai/gpt-4o-mini"
  REFINER_MODEL: "openai/gpt-4o-mini"
  JUDGE_MODEL: "anthropic/claude-sonnet-4-5"
  # Pipeline config
  ADVERSARIAL_MAX_ROUNDS: "2"
  # ELM (disabled by default in K8s; coordinator only)
  ELM_ENABLED: "false"
  # OpenRouter
  OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1"
